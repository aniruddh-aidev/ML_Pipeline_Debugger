name: ml_pipeline_env
spec_version: "1"
version: "1.0.0"
type: space
runtime: fastapi
description: >
  An OpenEnv environment where an LLM agent debugs broken ML pipelines.
  Three tasks of increasing difficulty: data leakage, silent encoding errors,
  and PyTorch shape mismatches with wrong loss functions.

author: aniruddh-aidev
license: MIT

entrypoint: server.app:app
port: 7860

action_model: ml_pipeline_env.models:MLPipelineAction
observation_model: ml_pipeline_env.models:MLPipelineObservation

tasks:
  - id: task_easy
    name: Fix Data Leakage
    difficulty: easy
    description: Fix data leakage — scaler fit before train/test split
    grader: ml_pipeline_env.tasks:grade_easy
  - id: task_medium
    name: Silent Encoding Error
    difficulty: medium
    description: Fix silent encoding error — string booleans cast to int incorrectly
    grader: ml_pipeline_env.tasks:grade_medium
  - id: task_hard
    name: Advanced PyTorch Bugs
    difficulty: hard
    description: Fix 3 PyTorch bugs — wrong output size, wrong loss, shape mismatch
    grader: ml_pipeline_env.tasks:grade_hard

reward:
  type: float
  range: [0.001, 0.999]
  description: Graded score per task based on correctness of the fix
